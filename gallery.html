<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loona 链路编排台 · Flow Builder</title>
<link rel="stylesheet" href="css/loona.css">
<link rel="stylesheet" href="css/carousel.css">
<link rel="stylesheet" href="css/flow-builder.css">
</head>
<body class="flow-body">

<!-- 顶栏 -->
<div class="fb-topbar">
  <h1><span class="dot"></span>链路编排台</h1>
  <input id="flowTitle" type="text" placeholder="链路标题" value="自定义链路">
  <button class="fb-btn" id="flowPreviewBtn">▶ 预览播放</button>
  <button class="fb-btn" id="flowExportBtn">导出 JSON</button>
  <button class="fb-btn" id="flowDownloadBtn">下载 .js</button>
  <button class="fb-btn" id="flowClearBtn">清空</button>
  <span class="fb-msg" id="flowMsg"></span>
  <span class="spacer"></span>
  <a class="fb-glink" href="index.html">← 回工作台</a>
</div>

<!-- 三栏 -->
<div class="fb-main">
  <div class="fb-pane">
    <div class="fb-pane-title">卡片库 · 拖到中间或点击添加</div>
    <div id="flowPalette"></div>
  </div>
  <div class="fb-pane">
    <div class="fb-pane-title">链路序列 · 拖拽排序 / 点击编辑</div>
    <div id="flowCanvas"></div>
  </div>
  <div class="fb-pane">
    <div class="fb-pane-title">检查器 · 编辑选中步骤</div>
    <div id="flowInspector"></div>
  </div>
</div>

<!-- 预览弹层：内含完整 loona-stage（id 对齐工作台，供预览引擎渲染） -->
<div class="fb-modal" id="flowPreviewModal">
  <div class="fb-modal-box">
    <div class="fb-modal-bar">
      <button class="fb-btn primary" id="flowPreviewPlay">▶ 播放 / 重播</button>
      <span class="spacer"></span>
      <button class="fb-btn" id="flowPreviewClose">关闭</button>
    </div>
    <div class="sb-screen">
      <div class="loona-stage web-stage" id="loonaStage" data-skin="glass">
        <div class="content-scrim"></div>
        <div class="story-layer" id="storyLayer"></div>
        <section class="carousel-panel hidden" id="carouselPanel" aria-label="结构化结果">
          <div class="carousel-head">
            <button id="backOverview" class="carousel-back hidden" type="button">‹ 返回总览</button>
            <h2 id="carouselTitle">旅行规划</h2>
          </div>
          <div id="carouselRail" class="carousel-rail"></div>
        </section>
        <div class="pop-slot" id="popSlot"></div>
        <div class="content-area" id="contentArea"></div>
        <div class="toast-slot" id="toastSlot"></div>
        <div class="subtitle" id="subtitle"></div>
      </div>
    </div>
    <!-- 引擎需要但预览不展示的落点（隐藏，防空指针） -->
    <div style="display:none">
      <div id="nowStage"></div><button id="annLive"></button>
      <div id="sideTrack"></div><div id="timeline"></div><div id="waitBanner"></div>
    </div>
  </div>
</div>

<!-- 复用：组件 / 轮播 / 适配器 / TTS 清单 / 配置 / 引擎（预览） -->
<script src="js/components.js"></script>
<script src="js/carousel.js"></script>
<script src="js/carousel-adapter.js"></script>
<script src="assets/tts/manifest.js"></script>
<script src="js/config.js"></script>
<script src="js/engine.js"></script>
<!-- 编排台模块（松耦合，各管一文件） -->
<script src="js/flow/flow-store.js"></script>
<script src="js/flow/flow-templates.js"></script>
<script src="js/flow/flow-render.js"></script>
<script src="js/flow/flow-palette.js"></script>
<script src="js/flow/flow-canvas.js"></script>
<script src="js/flow/flow-inspector.js"></script>
<script src="js/flow/flow-preview.js"></script>
<script src="js/flow/flow-export.js"></script>
<script src="js/flow/flow-builder.js"></script>
</body>
</html>
