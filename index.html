<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loona 交互工作台 v1 · 旅游 case</title>
<link rel="stylesheet" href="css/loona.css">
<link rel="stylesheet" href="css/skins.css">
<link rel="stylesheet" href="css/news-forms.css">
<link rel="stylesheet" href="css/scenario-forms.css">
<link rel="stylesheet" href="css/carousel.css">
<link rel="stylesheet" href="css/console.css">
<link rel="stylesheet" href="css/storyboard.css">
</head>
<body>
<div class="wb">

  <!-- ===== 顶部控制条 ===== -->
  <header class="wb-header">
    <span class="brand"><span class="dot"></span>Loona 工作台</span>
    <select class="speed-sel case-sel" id="caseSel" title="切换 case"></select>
    <div class="variant-bar" id="variantBar"></div>
    <span class="spacer"></span>

    <div class="ctrl-group">
      <button class="ctrl-btn primary" id="btnPlay"><span class="ico">▶</span><span id="playLbl">播放</span></button>
      <button class="ctrl-btn" id="btnStep"><span class="ico">⏭</span>单步</button>
      <button class="ctrl-btn" id="btnReplay"><span class="ico">↻</span>重播</button>
    </div>

    <div class="ctrl-group">
      <select class="speed-sel" id="speedSel" title="调速">
        <option value="0.5">0.5×</option>
        <option value="0.75">0.75×</option>
        <option value="1" selected>1×</option>
        <option value="1.5">1.5×</option>
        <option value="2">2×</option>
      </select>
      <label class="tts-toggle"><input type="checkbox" id="ttsChk" checked> 朗读 TTS</label>
      <label class="tts-toggle"><input type="checkbox" id="autoChk" checked> 自动过停等</label>
    </div>

    <div class="ctrl-group">
      <a class="ctrl-btn" href="gallery.html" target="_blank">🧩 组件库</a>
      <button class="ctrl-btn" id="btnShare" title="复制理想链路 JSON 到剪贴板">⧉ 分享</button>
      <button class="ctrl-btn" id="btnExport">⬇ 导出 JSON</button>
    </div>
  </header>

  <!-- ===== 三栏主体 ===== -->
  <div class="wb-body">

    <!-- 左：事件时间线 -->
    <section class="wb-col left">
      <!-- 立场带：当前 case 对应的「框架立场」标签（演示对照用） -->
      <div class="stance-bar" id="stanceBar" hidden></div>
      <div class="col-title"><span>事件时间线 · 理想链路</span><span id="tlCount"></span></div>
      <div class="tl-toolbar">
        <div class="tl-search">
          <span class="tl-search-ico">⌕</span>
          <input id="tlSearch" type="text" placeholder="搜索文字 / 类型…" autocomplete="off">
          <button class="tl-search-x" id="tlSearchX" title="清除" hidden>✕</button>
        </div>
        <div class="tl-filters" id="tlFilters">
          <button class="tl-fchip active" data-filter="all">全部</button>
          <button class="tl-fchip" data-filter="user">用户</button>
          <button class="tl-fchip" data-filter="agent">agent</button>
          <button class="tl-fchip" data-filter="card">卡</button>
          <button class="tl-fchip" data-filter="confirm">确认门</button>
          <button class="tl-fchip" data-filter="flagged">已标注</button>
        </div>
      </div>
      <div class="timeline" id="timeline"></div>
      <div class="tl-empty-hint" id="tlEmptyHint" hidden>没有匹配的事件</div>
    </section>

    <!-- 中：横版设备（Loona 产品 UI 地基，对齐 Figma Frame 26/27 · 812×375） -->
    <section class="wb-col center">
      <div class="now-stage" id="nowStage">IDLE · 待命</div>
      <!-- 播放时「本步有标注」提示（设备外，不碰产品 UI） -->
      <button class="ann-live" id="annLive" hidden></button>
      <!-- 瀑布故事板：每个事件=一块宽舞台截图，往下平铺（buildStoryboard 出快照） -->
      <div class="storyboard" id="storyboardFeed"></div>
      <!-- 隐藏暂存舞台：仅供 buildStoryboard 渲染+克隆，不直接展示 -->
      <div class="sb-staging" id="sbStaging">
        <!-- web_ui 同款舞台：深色大眼睛底图，结果走轮播，澄清/确认/状态/字幕走玻璃浮层 -->
        <div class="loona-stage web-stage" id="loonaStage">
          <!-- 内容遮罩（玻璃浮层出现时柔化背景） -->
          <div class="content-scrim"></div>
          <!-- 叙事流：满屏「一图一刻」moment 层（独立于轮播） -->
          <div class="story-layer" id="storyLayer"></div>

          <!-- web_ui 同款轮播（结果卡：trip/news/mail/event/weather…）：横向 rail + 居中聚焦缩放 -->
          <section class="carousel-panel hidden" id="carouselPanel" aria-label="结构化结果">
            <div class="carousel-head">
              <button id="backOverview" class="carousel-back hidden" type="button">‹ 返回总览</button>
              <h2 id="carouselTitle">旅行规划</h2>
              <div class="carousel-controls">
                <button id="prevItem" class="icon-button" type="button" title="上一项/上一天">‹</button>
                <button id="nextItem" class="icon-button" type="button" title="下一项/下一天">›</button>
              </div>
            </div>
            <div id="carouselRail" class="carousel-rail"></div>
          </section>

          <!-- 右上菜单（vg_menu） -->
          <button class="vg-menu" title="菜单"></button>
          <!-- pop_small 槽（右上） -->
          <div class="pop-slot" id="popSlot"></div>
          <!-- 浮层内容区（澄清/确认/失败/回执 玻璃卡） -->
          <div class="content-area" id="contentArea"></div>
          <!-- toast 槽 -->
          <div class="toast-slot" id="toastSlot"></div>
          <!-- 底部 TTS 字幕 -->
          <div class="subtitle" id="subtitle"></div>
        </div>
      </div>
      <!-- 停等横幅（澄清/确认门） -->
      <div class="wait-banner" id="waitBanner"></div>
    </section>

    <!-- 右：agent 侧轨 + 编辑器（可拖拽分隔 + 侧轨可折叠） -->
    <section class="wb-col right">
      <div class="review-hub" id="reviewHub">
        <!-- 选中节点的评论串（点中间任一节点联动） -->
        <div class="rh-block rh-nodeblock">
          <div class="rh-title">节点评论</div>
          <div class="rh-thread" id="rhThread"></div>
        </div>
        <!-- 总评（整条链路，event_idx = -1） -->
        <details class="rh-det" open>
          <summary>📋 总评（整条链路）</summary>
          <div class="rh-summary" id="rhSummary"></div>
        </details>
        <!-- 全链评论活动流 -->
        <details class="rh-det" open>
          <summary>🕓 评论活动流 <span class="rh-cnt" id="rhActCount"></span></summary>
          <div class="rh-activity" id="rhActivity"></div>
        </details>
        <!-- 折叠保留：编辑链路 -->
        <details class="rh-det">
          <summary>✎ 编辑链路（改文案 / 节奏 / 卡内容）</summary>
          <div class="editor" id="editor"></div>
        </details>
        <!-- 折叠保留：agent 内部决策日志（侧轨；引擎渲染落点，保留） -->
        <details class="rh-det">
          <summary>⚙ agent 内部决策日志</summary>
          <div class="sidetrack" id="sideTrack"></div>
        </details>
      </div>
    </section>

  </div>
</div>

<!-- 并排对比 overlay（协作控制台） -->
<div class="cmp-overlay" id="cmpOverlay"></div>

<!-- 组件库 → case 数据(多个) → 引擎 → 编辑器 → 控制台（经典 script，file:// 直接可跑） -->
<script src="js/components.js"></script>
<script src="js/scenario-forms.js"></script>
<!-- web_ui 原样搬来的轮播渲染器 + 工作台结果卡适配器 -->
<script src="js/carousel.js"></script>
<script src="js/carousel-adapter.js"></script>
<!-- 预渲染百炼 TTS 清单（node tools/gen_tts.mjs 生成；缺则引擎回落浏览器合成） -->
<script src="assets/tts/manifest.js"></script>
<script src="cases/companion_chat.js"></script>
<script src="cases/weather_5d.js"></script>
<script src="cases/news_briefing.js"></script>
<script src="cases/email_briefing.js"></script>
<script src="cases/calendar_today.js"></script>
<script src="cases/email_calendar_workflow.js"></script>
<script src="cases/restaurant_quiet.js"></script>
<script src="cases/travel_chengdu_3d.js"></script>
<script src="cases/travel_chengdu_5d.js"></script>
<script src="cases/travel_chengdu_5d_2stage.js"></script>
<script src="cases/travel_chengdu_story.js"></script>
<script src="cases/travel_chengdu_film.js"></script>
<!-- 三方案对比 mock（杭州）：A 封面卡钻取 / C 总览+亮点条 / B 种草灵感流 -->
<script src="cases/travel_hangzhou_a.js"></script>
<script src="cases/travel_hangzhou_c.js"></script>
<script src="cases/travel_hangzhou_b.js"></script>
<!-- 泛化：不同目的地×人群（同范式骨架 + 同款暖/种草 TTS） -->
<script src="cases/travel_chongqing_couple.js"></script>
<script src="cases/travel_xian_solo.js"></script>
<script src="cases/travel_xiamen_family.js"></script>
<script src="cases/travel_dali_friends.js"></script>
<!-- 新形式：多目的地对比 / 主题玩法 / 交通·住宿·预算卡 -->
<script src="cases/travel_compare_cities.js"></script>
<script src="cases/travel_theme_chengdu.js"></script>
<script src="cases/travel_logistics_demo.js"></script>
<script src="cases/meeting_action.js"></script>
<!-- case「立场标签」映射（演示对照用） -->
<script src="js/case-stance.js"></script>
<!-- 运行配置 + 评论同步层（Supabase 实时多人 / localStorage 单机兜底；file:// 可跑） -->
<script src="js/config.js"></script>
<script src="js/comment-sync.js"></script>
<script src="js/engine.js"></script>
<script src="js/editor.js"></script>
<script src="js/console.js"></script>
<script src="js/storyboard.js"></script>
<script src="js/news-gestures.js"></script>
<script>
(function () {
  var $ = function (id) { return document.getElementById(id); };
  var refs = {
    popSlot: $('popSlot'), toastSlot: $('toastSlot'), contentArea: $('contentArea'),
    subtitle: $('subtitle'), sideTrack: $('sideTrack'), timeline: $('timeline'),
    waitBanner: $('waitBanner'), nowStage: $('nowStage'), annLive: $('annLive'),
    stage: $('loonaStage'),
    carouselPanel: $('carouselPanel'), carouselRail: $('carouselRail'), carouselTitle: $('carouselTitle'), carouselBack: $('backOverview'),
    storyLayer: $('storyLayer')
  };

  var engine = LoonaEngine.init(refs);
  LoonaEditor.init(engine, { editor: $('editor') });
  LoonaConsole.init(engine, { variantBar: $('variantBar'), btnCompare: $('btnCompare'), cmpOverlay: $('cmpOverlay'), tlCount: $('tlCount') });
  LoonaStoryboard.init(engine, { feed: $('storyboardFeed'), nodeThread: $('rhThread'), summaryBody: $('rhSummary'), activityBody: $('rhActivity'), actCount: $('rhActCount') });

  /* ===== 左栏时间线：搜索 + 类型筛选（纯视图层，链路重建后自动重应用） ===== */
  var tlSearch = $('tlSearch'), tlSearchX = $('tlSearchX'), tlFilters = $('tlFilters'), tlEmptyHint = $('tlEmptyHint'), sidetrackCount = $('sidetrackCount');
  var curFilter = 'all', curQuery = '';
  function updateSidetrackCount() {
    var n = 0, evs = engine.events || [];
    for (var i = 0; i < evs.length; i++) if (evs[i].internal || evs[i].comp === 'agent_step') n++;
    if (sidetrackCount) sidetrackCount.textContent = n ? (n + ' 步') : '';
  }
  function applyTimelineFilter() {
    var rows = refs.timeline.querySelectorAll('.tl-event'), shown = 0;
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      var okF = curFilter === 'all'
        || (curFilter === 'flagged' ? r.dataset.flagged === '1' : r.dataset.group === curFilter);
      var okQ = !curQuery || (r.dataset.search || '').indexOf(curQuery) >= 0;
      var vis = okF && okQ;
      r.classList.toggle('tl-hidden', !vis);
      if (vis) shown++;
    }
    if (tlEmptyHint) tlEmptyHint.hidden = shown > 0 || (rows.length === 0);
    updateSidetrackCount();
  }
  engine.onTimelineBuilt = applyTimelineFilter;
  tlSearch.addEventListener('input', function () {
    curQuery = this.value.trim().toLowerCase();
    tlSearchX.hidden = !curQuery;
    applyTimelineFilter();
  });
  tlSearchX.addEventListener('click', function () { tlSearch.value = ''; curQuery = ''; tlSearchX.hidden = true; tlSearch.focus(); applyTimelineFilter(); });
  tlFilters.addEventListener('click', function (e) {
    var b = e.target.closest ? e.target.closest('.tl-fchip') : null; if (!b) return;
    curFilter = b.dataset.filter;
    var chips = tlFilters.querySelectorAll('.tl-fchip');
    for (var i = 0; i < chips.length; i++) chips[i].classList.toggle('active', chips[i] === b);
    applyTimelineFilter();
  });

  /* ===== 右栏：侧轨 ↔ 编辑器 可拖拽分隔 + 侧轨可折叠（高度持久化） ===== */
  (function () {
    var split = $('rightSplit'), pane = $('paneSidetrack'), divider = $('rsDivider'), head = $('sidetrackHead');
    if (!split || !pane || !divider) return;
    var KEY = 'loona_sidetrack_h', CKEY = 'loona_sidetrack_collapsed';
    function clamp(h) { var max = split.clientHeight - 140; return Math.max(72, Math.min(h, Math.max(120, max))); }
    function setH(h) { var v = clamp(h); pane.style.flex = '0 0 ' + v + 'px'; try { localStorage.setItem(KEY, v); } catch (e) {} }
    function setCollapsed(on) { pane.classList.toggle('collapsed', on); try { localStorage.setItem(CKEY, on ? '1' : '0'); } catch (e) {} }
    var saved = null; try { saved = +localStorage.getItem(KEY); } catch (e) {}
    pane.style.flex = (saved && saved > 72) ? ('0 0 ' + saved + 'px') : '0 0 38%';
    try { if (localStorage.getItem(CKEY) === '1') pane.classList.add('collapsed'); } catch (e) {}
    head.addEventListener('click', function () { setCollapsed(!pane.classList.contains('collapsed')); });
    var dragging = false;
    divider.addEventListener('mousedown', function (e) {
      if (pane.classList.contains('collapsed')) setCollapsed(false);
      dragging = true; document.body.style.cursor = 'row-resize'; e.preventDefault();
    });
    window.addEventListener('mousemove', function (e) { if (dragging) setH(e.clientY - split.getBoundingClientRect().top); });
    window.addEventListener('mouseup', function () { if (dragging) { dragging = false; document.body.style.cursor = ''; } });
    divider.addEventListener('dblclick', function () { pane.style.flex = '0 0 38%'; try { localStorage.removeItem(KEY); } catch (e) {} });
  })();

  /* ---- 轮播左右切卡（web_ui 同款 prev/next）---- */
  if ($('prevItem')) $('prevItem').addEventListener('click', function () { engine.carouselNav(-1); });
  if ($('nextItem')) $('nextItem').addEventListener('click', function () { engine.carouselNav(1); });

  /* 用例注册表（case 脚本各自挂到 window.LOONA_CASES）—— 旅游(两阶段)置顶为默认，其余场景恢复 */
  var CASES = window.LOONA_CASES || {};
  var ORDER = ['travel_chongqing_couple', 'travel_xian_solo', 'travel_xiamen_family', 'travel_dali_friends', 'travel_compare_cities', 'travel_theme_chengdu', 'travel_logistics_demo', 'travel_chengdu_film', 'travel_chengdu_story', 'travel_chengdu_5d', 'travel_chengdu_5d_2stage', 'travel_chengdu_3d', 'travel_hangzhou_a', 'travel_hangzhou_c', 'travel_hangzhou_b', 'companion_chat', 'weather_5d', 'news_briefing', 'email_briefing', 'calendar_today',
    'email_calendar_workflow', 'restaurant_quiet',
    'meeting_action'];
  var ids = ORDER.filter(function (k) { return CASES[k]; })
    .concat(Object.keys(CASES).filter(function (k) { return ORDER.indexOf(k) < 0; }));
  var sel = $('caseSel');
  ids.forEach(function (id) { var o = document.createElement('option'); o.value = id; o.textContent = CASES[id].title || id; sel.appendChild(o); });

  /* 每个场景有最合适的「默认展现形式」(case.default_skin)；载入即切到该形式，用户仍可手动切 */
  /* 经控制台中央加载：克隆为可编辑工作链 + 注册/恢复变体 + 渲染变体条（全局 CASES 保持原始） */
  function loadCase(id) { LoonaConsole.loadCase(id); }
  loadCase(ids[0]); sel.value = ids[0];
  sel.addEventListener('change', function () { loadCase(sel.value); });

  /* 控制条联动 */
  engine.onState = function (st) {
    var playing = st.playing && !st.paused;
    $('playLbl').textContent = playing ? '暂停' : (st.atEnd ? '重播' : (st.paused ? '继续' : '播放'));
    $('btnPlay').querySelector('.ico').textContent = playing ? '⏸' : '▶';
  };

  $('btnPlay').addEventListener('click', function () {
    if (engine.idx >= engine.events.length && engine.mode !== 'play') { engine.replay(); return; }
    engine.toggle();
  });
  $('btnStep').addEventListener('click', function () { engine.step(); });
  $('btnReplay').addEventListener('click', function () { engine.replay(); });
  $('speedSel').addEventListener('change', function () { engine.setSpeed(this.value); });
  $('ttsChk').addEventListener('change', function () { engine.setTTS(this.checked); });
  $('autoChk').addEventListener('change', function () { engine.setAutoWaits(this.checked); });
  $('btnExport').addEventListener('click', function () { LoonaEditor.exportJSON(); });
  $('btnShare').addEventListener('click', function () { LoonaConsole.share(); });

  /* 键盘：空格=播/停，→=单步，R=重播，1/2/3=切风格 */
  document.addEventListener('keydown', function (e) {
    if (/INPUT|TEXTAREA|SELECT/.test((e.target.tagName || ''))) return;
    if (e.code === 'Space') { e.preventDefault(); $('btnPlay').click(); }
    else if (e.code === 'ArrowRight') { e.preventDefault(); engine.step(); }
    else if (e.key === 'r' || e.key === 'R') { engine.replay(); }
    else if (e.key === '1') engine.setTheme('glass');
    else if (e.key === '2') engine.setTheme('bubble');
    else if (e.key === '3') engine.setTheme('aura');
  });

  engine._emitState();
})();
</script>
</body>
</html>
